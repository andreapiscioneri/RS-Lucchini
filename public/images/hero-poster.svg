<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <!-- Placeholder hero poster (sostituire con foto/video reale acciaieria) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#11141C"/>
      <stop offset="100%" stop-color="#070A0F"/>
    </linearGradient>
    <radialGradient id="glow" cx="40%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#F97316" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- Industrial silhouettes -->
  <g fill="#1A1F29" opacity="0.85">
    <polygon points="0,820 220,720 380,780 540,700 720,760 900,690 1080,760 1260,710 1440,790 1620,720 1920,800 1920,1080 0,1080"/>
  </g>
  <g fill="#0B0F14">
    <polygon points="0,900 280,820 460,880 640,820 820,880 980,820 1180,890 1380,830 1580,890 1920,860 1920,1080 0,1080"/>
  </g>

  <!-- Sparks -->
  <g fill="#F97316">
    <circle cx="460" cy="640" r="2"/>
    <circle cx="500" cy="660" r="1.5"/>
    <circle cx="520" cy="600" r="1"/>
    <circle cx="900" cy="580" r="2.5"/>
    <circle cx="940" cy="560" r="1"/>
    <circle cx="1260" cy="640" r="2"/>
